name: euch
description: "Малітоўнік Эўхарыстак"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^16.2.1
  firebase_core: ^4.5.0
  cloud_firestore: ^6.0.3
  firebase_auth: ^6.1.1
  shared_preferences: ^2.5.3
  file_picker: ^10.3.2
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  flutter_html: ^3.0.0
  wakelock_plus: ^1.4.0
  collection: ^1.19.1
  google_fonts: ^6.3.1
  flex_color_scheme: ^8.0.0
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: lib/assets/icon.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  image: lib/assets/icon.png
  android: true
  ios: true
  android_12:
    color: "#FFFFFF"
    image: lib/assets/icon.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - lib/assets/icon.png
